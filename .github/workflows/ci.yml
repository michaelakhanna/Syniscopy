name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  python-smoke:
    name: Python source smoke checks (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            nbformat \
            pyyaml

      - name: Syntax-check Python sources
        run: |
          python -m compileall -q codebase

      - name: Validate numbered supplemental notebooks
        run: |
          python - <<'PY'
          import nbformat
          from pathlib import Path
          expected = [Path("supplemental") / f"E{i:02d}.ipynb" for i in range(1, 10)]
          missing = [str(path) for path in expected if not path.exists()]
          if missing:
              raise SystemExit(f"missing notebooks: {missing}")
          for path in expected:
              nbformat.read(path, as_version=4)
          PY

      - name: Verify release notices and excluded outputs
        run: |
          test -f THIRD_PARTY_NOTICES.md
          test -f LICENSE
          test ! -d supplemental/outputs
          python - <<'PY'
          from pathlib import Path
          required = [
              "10.17638/datacat.liverpool.ac.uk/2592",
              "Segment Anything Model 2",
              "Apache License 2.0",
              "Creative Commons Attribution 4.0",
          ]
          text = Path("THIRD_PARTY_NOTICES.md").read_text(encoding="utf-8")
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f"THIRD_PARTY_NOTICES.md missing: {missing}")
          PY

      - name: Check shell entry points
        run: |
          bash -n sam2_starter/package_source_zip.sh

      - name: Verify CITATION.cff parses
        run: |
          python -c "import yaml; yaml.safe_load(open('CITATION.cff', encoding='utf-8'))"

      - name: Verify public source tree boundaries
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          python scripts/verify_release_tree.py .

  paper:
    name: Compile paper PDF
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pictures \
            lmodern

      - name: Compile paper
        working-directory: paper
        run: |
          pdflatex -interaction=nonstopmode main || true
          bibtex main || true
          pdflatex -interaction=nonstopmode main || true
          pdflatex -interaction=nonstopmode main

      - name: Verify PDF
        run: |
          test -s paper/main.pdf
